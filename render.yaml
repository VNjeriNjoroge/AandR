services:
  - type: web
    name: getnoticd-app  # You can change this to your app name
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn AandR.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 
      - key: DJANGO_SETTINGS_MODULE
        value: AandR.settings
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: getnoticd-db # This links to the DB below
          property: connectionString

databases:
  - name: getnoticd-db
    plan: free